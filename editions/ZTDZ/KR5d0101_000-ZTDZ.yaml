front:
  text: 二經同卷唱五
  hash: sha256:dff101b1d6ff106575599bf05f4122c7f9e2522c9f98eecbc776800db02f58af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0101_SJB_000-240149b, image: sjb/24/240149b.png}
body:
  text: 玉室經真人高象先金丹歌玉室經德州草渾李成之述禁戒章第一色慾傷精氣泄津液損肺氣怒傷肝氣思傷心氣青龍左馳不可出境白虎右行動而爲禮六丁六甲十二宫神年神月將在壇下執事按九五宫行周天火候甚詳矣分爐鼎章第二爐長五寸法五行闊四寸法四時風伯雨師環而護衛八卦神將從而相合鼎又在其中焉長三寸法三才曰隂鼎陽在乎外故曰陽爐陽所以用乎隂陽所以成於隂陽所以居乎中易曰剛中正履帝位蓋陽在其中矣帝又陽之純陽所以陽藏全用其隂數且夫爐鼎之間有何物也四象藉土而成故曰四象以土而言則謂之五行日月相符則謂之七政躔度周天斡旋天地則未始能出焉欲以五行不亂當固其爐全其鼎兹所以能成乎物也日月章第三陽之數八十一隂之數隨之隂之數六十四陽變而合之日月之會動照而明養物而成黄庭十刻而相纏貴不用一也絳宫内外而相授貴不知火也肝所以龍居焉肺所以虎藏焉日所以從而來月所以從而運則無疑焉四象章第四坎所以十五離所以十五震所以十五兊所以十五乾坤艮巽輔相四象中五周天裁成八卦大衍四十九而還返存焉火氣七十二而二十八宿在焉輪用乎輻輻安乎輪周而復始弊而再新二符出入兹不出乎屯蒙也明坎離章第五坎屬水中曰長男離屬火中曰長女隂陽未發故曰男女隂陽已發故曰夫婦鉛汞者夫婦之所以生風雨者夫婦之所以迎要在推乾巽而已長黄芽章第六黄芽生曰三田三田曰三室室之與田分内外之義芽之所長辯剛柔之體自太始太初太玄太素太沖太微太極至混沌以至於二儀莫不由乎黄芽而至乎天地能長且久也哉夫道生一一生二二生三三者以物言之則天地人以理言之亦曰三田也中田動而能生曰人上田清而且剛曰天下田厚而載物曰地聖人博於厚地仰於高天俯於治人則其於三田備矣然不可離乎黄芽之所長養也論日月章第七日月之會有三十輻焉隂陽之配有六子之成焉黄極周旋上下流精九宫岀入戊己爲先計三百六十五度之功立合九轉迴環之妙用丙丁壬癸甲乙庚辛又以合之之數而存焉風雨章第八風之所以來巽雨之所以降乾息之十二旋運而有方則之二十四合而有矩動不以禮則風之乖於物降不以節則雨之失於物風雨之勢莫大乎與人爲善也戊己章第九戊者土之象己者土之根戊己以爲主日月以爲居四時之變隨之而由六月之交爲帝之旺嘉禾所以在此而生焉黄極所以在此而用焉棄之斯道則未聞也禍福章第十禍之所以倚者福也福之所以藏者禍也禍福由履之生造化因動而成因之以十三徒繼之以十三徒老子曰玄牝之門是謂天地根正謂此歟乾坤章第十一乾坤者易之門六十二卦變之而出坎離者隂陽之長六子待之而從陽奇隂偶我不以爲離也日往月來我不以爲虧也上下弦之精否泰時之至不岀烏兎之光輝而已入室章第十二性所以貴早復則德之積於己事所以貴不惑則明之辯於物物辯則物我兩分德積則充實至美至美不美辯物愛物敬父以孝則可以事君處己以順則可以事長二者孰先曰在家則孝之始在君則忠之始處己以順則事長之始此者備矣然後知性命之本信爲大焉通玄章第十三性兮深若海吾不知水之深也淵兮利萬物吾不知其利之厚也杳杳默默吾不知所自也以黑害白吾不知所污也道非道玄非玄君子得之不失乎動容周旋也玉室經
